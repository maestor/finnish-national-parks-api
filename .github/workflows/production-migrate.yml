name: Production Migration

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-database
  cancel-in-progress: false

jobs:
  migrate-production-database:
    name: Migrate production database
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for pending production migrations
        id: pending-migrations
        env:
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate:pending

      - name: Backup production database
        if: steps.pending-migrations.outputs.has_pending == 'true'
        env:
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:backup -- before-production-migrate

      - name: Upload backup artifact
        if: steps.pending-migrations.outputs.has_pending == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: production-db-backup-${{ github.run_id }}
          path: data/backups/*.db
          if-no-files-found: error
          retention-days: 14

      - name: Run production migrations
        if: steps.pending-migrations.outputs.has_pending == 'true'
        env:
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate

      - name: Skip backup and migrate when schema is current
        if: steps.pending-migrations.outputs.has_pending != 'true'
        run: echo "Production database is already up to date."
